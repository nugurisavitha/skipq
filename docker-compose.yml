version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:7
    container_name: skipq-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-password}
      MONGO_INITDB_DATABASE: skipq_app
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - skipq-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service (Node.js Express)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: skipq-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      MONGO_URI: mongodb://admin:password@mongodb:27017/skipq_app?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      PORT: ${PORT:-5000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      SOCKET_IO_CORS_ORIGIN: ${SOCKET_IO_CORS_ORIGIN:-http://localhost:3000}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-your_razorpay_key}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-your_razorpay_secret}
      APP_URL: ${APP_URL:-http://localhost:5000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@skipq.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin123!@#}
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - skipq-network
    command: npm run dev

  # Frontend Service (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: skipq-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000}
      VITE_SOCKET_URL: ${VITE_SOCKET_URL:-http://localhost:5000}
    ports:
      - "${FRONTEND_PORT:-3000}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - skipq-network
    command: npm run dev

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  skipq-network:
    driver: bridge
